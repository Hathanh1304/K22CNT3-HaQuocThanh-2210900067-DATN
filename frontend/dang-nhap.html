<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlightVN - Đăng nhập</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: linear-gradient(135deg, #003580, #0066cc);
      color: white; padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .logo { font-size: 24px; font-weight: 700; }
    header .logo span { color: #f5a623; }
    header nav a { color: white; text-decoration: none; margin-left: 24px; font-size: 14px; }

    .auth-container {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 40px 16px;
    }
    .auth-box {
      background: white; border-radius: 16px; padding: 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .auth-box h2 { font-size: 24px; color: #003580; margin-bottom: 8px; }
    .auth-box p  { color: #888; font-size: 14px; margin-bottom: 28px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; }
    .form-group input {
      padding: 14px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #0066cc; }

    .btn-auth {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #003580, #0066cc);
      color: white; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px; transition: transform 0.1s;
    }
    .btn-auth:hover { transform: translateY(-1px); }

    .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .auth-link a { color: #0066cc; text-decoration: none; font-weight: 600; }

    .error-msg { color: #e84545; font-size: 13px; margin-top: 8px; display: none; }
    footer { background: #002050; color: #aaa; text-align: center; padding: 24px; font-size: 13px; }
  </style>
</head>
<body>
<header>
  <div class="logo">Flight<span>VN</span></div>
  <nav><a href="index.html">← Trang chủ</a></nav>
</header>

<div class="auth-container">
  <div class="auth-box">
    <h2>✈ Đăng nhập</h2>
    <p>Chào mừng bạn quay lại FlightVN!</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="matkhau" placeholder="••••••••">
    </div>
    <div class="error-msg" id="error-msg">❌ Email hoặc mật khẩu không đúng!</div>
    <button class="btn-auth" onclick="dangNhap()">Đăng nhập</button>

    <div class="auth-link">
      Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a>
    </div>
  </div>
</div>

<footer>© 2026 FlightVN</footer>

<script>
const API = 'http://127.0.0.1:5000/api';

async function dangNhap() {
  const email    = document.getElementById('email').value.trim();
  const matkhau  = document.getElementById('matkhau').value;
  if (!email || !matkhau) { alert('Vui lòng nhập đầy đủ!'); return; }

  const res  = await fetch(`${API}/khach-hang/dang-nhap`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, mat_khau: matkhau })
  });
  const data = await res.json();
  if (data.success) {
    localStorage.setItem('khach_hang', JSON.stringify(data.khach_hang));
    window.location.href = 'index.html';
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}
</script>
</body>
</html>
